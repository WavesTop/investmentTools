      <text class="tiny" x="18" y="28">方向分</text>
      <text class="red" x="18" y="62" font-size="28" font-weight="900">0.27</text>
      <text class="tiny" x="86" y="62">偏多</text>
      <rect class="soft" x="188" y="0" width="172" height="86" rx="8"/>
      <text class="tiny" x="206" y="28">入场时机</text>
      <text class="amber" x="206" y="62" font-size="28" font-weight="900">0.08</text>
      <text class="tiny" x="276" y="62">等待</text>
      <rect class="soft" x="376" y="0" width="172" height="86" rx="8"/>
      <text class="tiny" x="394" y="28">风险收益比</text>
      <text class="blue" x="394" y="62" font-size="28" font-weight="900">0.80</text>
      <text class="tiny" x="472" y="62">不足</text>
      <rect class="soft" x="564" y="0" width="172" height="86" rx="8"/>
      <text class="tiny" x="582" y="28">持有周期</text>
      <text class="purple" x="582" y="62" font-size="22" font-weight="900">短期观察</text>
      <rect class="soft" x="752" y="0" width="324" height="86" rx="8"/>
      <text class="tiny" x="770" y="28">下一动作</text>
      <text class="text" x="770" y="58" font-weight="800">不追高，跌回观察区后看量能和事件确认。</text>
