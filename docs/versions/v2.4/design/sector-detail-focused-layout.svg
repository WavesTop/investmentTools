    <text class="tiny" x="160" y="38">K 线 · MA20 / MA60 · 观察区 · 止损 / 止盈 · 成交量 · MACD</text>

    <!-- chart area -->
    <rect x="32" y="68" width="676" height="312" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <line x1="54" y1="322" x2="690" y2="322" stroke="#e2e8f0"/>
    <line x1="54" y1="260" x2="690" y2="260" stroke="#e2e8f0"/>
    <line x1="54" y1="198" x2="690" y2="198" stroke="#e2e8f0"/>
    <line x1="54" y1="136" x2="690" y2="136" stroke="#e2e8f0"/>
    <rect x="54" y="238" width="636" height="34" fill="#dbeafe" opacity="0.55"/>
    <text x="64" y="233" fill="#2563eb" font-size="12" font-weight="800">观察买入区 57.74 - 60.61</text>
    <line x1="54" y1="292" x2="690" y2="292" stroke="#dc2626" stroke-dasharray="6 6"/>
    <text x="64" y="287" fill="#dc2626" font-size="12" font-weight="800">止损失效位 55.35</text>
    <line x1="54" y1="118" x2="690" y2="118" stroke="#059669" stroke-dasharray="6 6"/>
    <text x="64" y="113" fill="#059669" font-size="12" font-weight="800">止盈减仓区 61.46 - 63.85</text>
    <polyline class="thin" points="56,286 92,278 128,266 164,255 200,250 236,230 272,224 308,210 344,184 380,176 416,156 452,146 488,132 524,120 560,105 596,88 632,96 672,76" stroke="#ef4444"/>
    <polyline class="thin" points="56,304 128,286 200,268 272,246 344,224 416,200 488,170 560,142 632,126 672,116" stroke="#f59e0b"/>
    <polyline class="thin" points="56,316 128,304 200,290 272,270 344,246 416,222 488,196 560,174 632,158 672,146" stroke="#7c3aed"/>
    <g fill="#ef4444" opacity="0.82">
      <rect x="72" y="330" width="12" height="34"/><rect x="118" y="336" width="12" height="28"/>
      <rect x="164" y="322" width="12" height="42"/><rect x="210" y="314" width="12" height="50"/>
      <rect x="256" y="306" width="12" height="58"/><rect x="302" y="298" width="12" height="66"/>
      <rect x="348" y="290" width="12" height="74"/><rect x="394" y="282" width="12" height="82"/>
      <rect x="440" y="274" width="12" height="90"/><rect x="486" y="266" width="12" height="98"/>
      <rect x="532" y="256" width="12" height="108"/><rect x="578" y="248" width="12" height="116"/>
      <rect x="624" y="262" width="12" height="102"/>
    </g>
    <polyline class="thin" points="56,406 104,420 152,410 200,430 248,414 296,438 344,418 392,434 440,416 488,426 536,402 584,410 632,394 680,404" stroke="#2563eb"/>
    <text class="tiny" x="32" y="408">MACD / 动量</text>

    <g transform="translate(32,402)">
      <rect class="soft" x="0" y="54" width="206" height="44" rx="6"/>
      <text class="tiny" x="14" y="81">MA20：59.82 · MA60：55.10</text>
      <rect class="soft" x="222" y="54" width="206" height="44" rx="6"/>
      <text class="tiny" x="236" y="81">RSI：77 · 过热边缘</text>
      <rect class="soft" x="444" y="54" width="232" height="44" rx="6"/>
      <text class="tiny" x="458" y="81">结论：趋势仍在，但当前不追</text>
    </g>

    <!-- Right insight column -->
    <rect class="panel" x="764" y="0" width="364" height="520" rx="10"/>
    <text class="h2" x="788" y="38">购买建议</text>
    <rect x="788" y="64" width="316" height="92" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
    <text class="h3" x="808" y="96">当前动作：减仓 / 等回踩</text>
    <text class="text" x="808" y="126">趋势没坏，但涨幅兑现过快。</text>
    <text class="tiny" x="808" y="148">建议把仓位动作和观察点分开，不直接买入。</text>

    <text class="h3" x="788" y="194">关键判断</text>
    <circle cx="798" cy="224" r="5" fill="#ef4444"/>
    <text class="text" x="814" y="230">价格接近止盈带，风险收益比不足。</text>
    <circle cx="798" cy="260" r="5" fill="#2563eb"/>
    <text class="text" x="814" y="266">回踩 57.74-60.61 后再看量能。</text>
    <circle cx="798" cy="296" r="5" fill="#059669"/>
    <text class="text" x="814" y="302">若站稳 63.85，重新进入趋势确认。</text>

    <text class="h3" x="788" y="350">预测摘要</text>
    <rect class="soft" x="788" y="370" width="316" height="118" rx="8"/>
    <text class="text" x="808" y="400" font-weight="800">未来 5-20 日：震荡消化</text>
    <text class="tiny" x="808" y="426">触发条件：成交量缩小但支撑不破。</text>
    <text class="text" x="808" y="456" font-weight="800">未来 20-60 日：事件验证后再上修</text>
    <text class="tiny" x="808" y="480">关注装机、硅料价格、政策补贴和订单。</text>
  </g>

  <!-- Event and forecast layer -->
