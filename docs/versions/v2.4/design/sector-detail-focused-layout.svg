<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1880" viewBox="0 0 1440 1880">
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .nav { fill: #101826; }
      .panel { fill: #ffffff; stroke: #dbe4f0; stroke-width: 1; }
      .soft { fill: #f8fafc; stroke: #dbe4f0; stroke-width: 1; }
      .muted { fill: #64748b; font-size: 15px; }
      .tiny { fill: #64748b; font-size: 13px; }
      .title { fill: #0f172a; font-size: 30px; font-weight: 800; }
      .h2 { fill: #0f172a; font-size: 21px; font-weight: 800; }
      .h3 { fill: #0f172a; font-size: 17px; font-weight: 800; }
      .text { fill: #1e293b; font-size: 15px; }
      .white { fill: #ffffff; }
      .red { fill: #ef4444; }
      .green { fill: #059669; }
      .blue { fill: #2563eb; }
      .amber { fill: #d97706; }
      .purple { fill: #7c3aed; }
      .line { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; }
    </style>
    <linearGradient id="decision" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="chartBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="1880"/>

  <!-- Left navigation -->
  <rect class="nav" x="0" y="0" width="248" height="1880"/>
  <text class="white" x="28" y="72" font-size="32" font-weight="800">InvestInsight</text>
  <text x="28" y="102" fill="#94a3b8" font-size="14">新闻驱动的板块洞察</text>
  <rect x="24" y="176" width="200" height="48" rx="8" fill="#e5edf9"/>
  <text x="56" y="206" fill="#0f2a55" font-size="16" font-weight="800">总览</text>
  <text x="56" y="278" fill="#dbeafe" font-size="16" font-weight="700">事件雷达</text>
  <text x="56" y="350" fill="#dbeafe" font-size="16" font-weight="700">板块机会</text>
  <rect x="24" y="390" width="200" height="48" rx="8" fill="#e5edf9"/>
  <text x="56" y="421" fill="#0f2a55" font-size="16" font-weight="800">策略跟踪</text>
  <text x="56" y="494" fill="#dbeafe" font-size="16" font-weight="700">AI 助手</text>
  <text x="56" y="566" fill="#dbeafe" font-size="16" font-weight="700">配置</text>
  <rect x="24" y="1660" width="200" height="86" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="44" y="1692" fill="#e2e8f0" font-size="17" font-weight="800">数据状态</text>
  <circle cx="46" cy="1722" r="6" fill="#22c55e"/>
  <text x="62" y="1728" fill="#dbeafe" font-size="14">行情等待刷新</text>
  <circle cx="46" cy="1748" r="6" fill="#fde047"/>
  <text x="62" y="1754" fill="#dbeafe" font-size="14">新闻等待扫描</text>

  <!-- Main shell -->
  <rect x="248" y="0" width="1192" height="70" fill="#ffffff" stroke="#e2e8f0"/>
