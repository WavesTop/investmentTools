    <text class="text" x="72" y="152">影响路径：组件排产改善 → 盈利预期修复 → 板块估值上修。</text>
    <circle cx="48" cy="190" r="9" fill="#d97706"/>
    <text class="h3" x="72" y="196">政策补贴与并网节奏</text>
    <text class="tiny" x="72" y="224">Scheduled · 未来 2-4 周验证</text>
    <text class="text" x="72" y="252">若政策弱于预期，反弹逻辑会转为短线资金博弈。</text>
    <circle cx="48" cy="292" r="9" fill="#2563eb"/>
    <text class="h3" x="72" y="298">海外利率预期变化</text>
    <text class="tiny" x="72" y="326">Expected · 成长估值链条</text>

