      <text class="h3" x="18" y="30">短期 5-20 日</text>
      <text class="amber" x="180" y="30" font-size="18" font-weight="900">震荡偏强 56%</text>
      <text class="tiny" x="18" y="58">验证：不破观察区，MACD 不转弱，新闻热度不衰减。</text>
      <rect class="soft" x="0" y="96" width="500" height="76" rx="8"/>
      <text class="h3" x="18" y="126">中期 20-60 日</text>
      <text class="green" x="180" y="126" font-size="18" font-weight="900">事件兑现后上修</text>
      <text class="tiny" x="18" y="154">验证：订单、价格、资金持续性同时改善。</text>
      <rect class="soft" x="0" y="192" width="500" height="76" rx="8"/>
      <text class="h3" x="18" y="222">长周期 60-120 日</text>
      <text class="blue" x="180" y="222" font-size="18" font-weight="900">产业趋势观察</text>
      <text class="tiny" x="18" y="250">验证：业绩确认，供给出清，估值分位仍可接受。</text>
    </g>
  </g>

  <!-- Evidence layer -->
  <g transform="translate(280,1360)">
    <rect class="panel" x="0" y="0" width="1128" height="370" rx="10"/>
    <text class="h2" x="24" y="38">证据层</text>
    <text class="tiny" x="104" y="38">默认摘要展示，点击后展开完整明细；信息不删除，但不抢首屏重点</text>

    <g transform="translate(24,72)">
      <rect class="soft" x="0" y="0" width="528" height="60" rx="8"/>
      <text class="h3" x="18" y="36">新闻证据</text>
      <text class="tiny" x="126" y="36">38 条 · 3 条核心新闻已用于事件分析 · 查看全部</text>
      <rect class="soft" x="576" y="0" width="504" height="60" rx="8"/>
      <text class="h3" x="594" y="36">资金流</text>
      <text class="tiny" x="682" y="36">近 5 日净流入放缓 · 主力分歧扩大 · 展开曲线</text>

      <rect class="soft" x="0" y="82" width="528" height="60" rx="8"/>
      <text class="h3" x="18" y="118">相关板块</text>
      <text class="tiny" x="126" y="118">电力设备、储能、硅料、逆变器 · 查看联动</text>
      <rect class="soft" x="576" y="82" width="504" height="60" rx="8"/>
      <text class="h3" x="594" y="118">技术指标</text>
      <text class="tiny" x="704" y="118">MACD、RSI、KDJ、BOLL、均线 · 展开表格</text>

      <rect class="soft" x="0" y="164" width="528" height="60" rx="8"/>
      <text class="h3" x="18" y="200">策略回测</text>
      <text class="tiny" x="126" y="200">趋势跟踪胜率 62% · 最大回撤 8.4% · 查看</text>
      <rect class="soft" x="576" y="164" width="504" height="60" rx="8"/>
      <text class="h3" x="594" y="200">数据质量</text>
      <text class="tiny" x="704" y="200">行情完整 · 新闻源 12 路 · 一致性 96 · 查看审计</text>

      <rect x="0" y="252" width="1080" height="70" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
      <text class="blue" x="18" y="286" font-size="16" font-weight="900">完整明细仍保留</text>
      <text class="text" x="156" y="286">新闻原文、资金曲线、技术表格、阶段收益、相关板块、数据质量全部放在证据层内展开。</text>
    </g>
  </g>
</svg>
