  <text class="muted" x="430" y="44">行情 · 事件 · 点位 · 预测 · 证据</text>
  <text x="1050" y="43" fill="#0f2a55" font-size="14" font-weight="700">✓ 12:45 · 420 板块 · 规则引擎 + AI 校验</text>

  <g transform="translate(280,98)">
    <!-- Header summary -->
    <text class="title" x="0" y="0">光伏</text>
    <text class="red" x="72" y="0" font-size="24" font-weight="800">+2.73%</text>
    <text class="muted" x="170" y="0">成分股 111 只 · 数据日期 2026-06-26 · 数据质量 80</text>

    <!-- Decision row -->
    <rect x="0" y="32" width="1128" height="260" rx="10" fill="url(#decision)" stroke="#fed7aa" filter="url(#shadow)"/>
    <text class="h2" x="26" y="74">决策摘要</text>
    <rect x="26" y="96" width="124" height="42" rx="7" fill="#fee2e2"/>
    <text class="red" x="48" y="123" font-size="20" font-weight="900">建议减仓</text>
    <text class="text" x="170" y="122">上涨后风险收益比下降，先保护利润；等待回踩观察区再评估。</text>

    <g transform="translate(26,156)">
