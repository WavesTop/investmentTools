    <text x="354" y="452" class="meta">Expected · FiscalPolicy · China · 可信度 0.78</text>
    <text x="354" y="472" class="body">财政落地 -> 消费链/家电/汽车 -> 订单与终端需求验证</text>
    <circle cx="310" cy="536" r="7" fill="#6D5DF6"/><rect x="336" y="506" width="536" height="86" rx="7" class="soft"/>
    <text x="354" y="534" class="h3">商品价格与库存扰动，玻璃基板逆势走强</text>
    <text x="354" y="558" class="meta">Expected · CommoditySupplyDemand · 可信度 0.74</text>
    <text x="354" y="578" class="body">库存/价格 -> 玻璃玻纤/建材 -> 资金承接确认</text>
  </g>

  <rect x="934" y="206" width="408" height="302" rx="8" class="surface"/>
  <text x="960" y="238" class="h2">关键事件队列</text>
  <text x="960" y="266" class="meta">事件 · 状态 · 观察点 · 影响说明</text>
  <text x="960" y="306" class="h3">AI 交易是否结束？</text><text x="960" y="330" class="body">状态：预期 · 观察：财报/订单/美债收益率</text>
  <text x="960" y="370" class="h3">财政资金下达</text><text x="960" y="394" class="body">状态：已发生 · 观察：终端需求和资金扩散</text>
  <text x="960" y="434" class="h3">商品价格扰动</text><text x="960" y="458" class="body">状态：待验证 · 观察：库存和供给数据</text>

  <rect x="934" y="532" width="408" height="300" rx="8" class="surface"/>
  <text x="960" y="564" class="h2">事件传导路径</text>
  <rect x="960" y="590" width="342" height="52" rx="6" fill="#F8FAFD" stroke="#DDE3EC"/><text x="978" y="622" class="body">财政资金 -> 消费需求 -> 家电/汽车 -> 订单验证</text>
  <rect x="960" y="656" width="342" height="52" rx="6" fill="#F8FAFD" stroke="#DDE3EC"/><text x="978" y="688" class="body">利率预期 -> 成长估值 -> 半导体 -> 财报验证</text>
  <rect x="960" y="722" width="342" height="52" rx="6" fill="#FFF7ED" stroke="#FED7AA"/><text x="978" y="754" class="body">失效条件：未传导到资金、订单或价格数据</text>
</svg>
