<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="860" viewBox="0 0 1366 860">
  <defs>
    <style>
      .bg{fill:#F5F7FA}.side{fill:#0E1626}.surface{fill:#fff;stroke:#DDE3EC}.soft{fill:#F8FAFD;stroke:#DDE3EC}.active{fill:#E8EEF9}
      .title{font:700 24px "Microsoft YaHei",Arial;fill:#111827}.h2{font:700 17px "Microsoft YaHei",Arial;fill:#111827}.h3{font:700 14px "Microsoft YaHei",Arial;fill:#111827}
      .body{font:400 12px "Microsoft YaHei",Arial;fill:#475569}.meta{font:400 11px "Microsoft YaHei",Arial;fill:#8A99AE}.num{font:700 24px "Microsoft YaHei",Arial;fill:#111827}
      .red{fill:#E5484D}.blue{fill:#2563EB}.green{fill:#16A34A}.orange{fill:#C2410C}.purple{fill:#6D5DF6}.line{stroke:#DDE3EC}
    </style>
  </defs>
  <rect class="bg" width="1366" height="860"/><rect class="side" width="236" height="860"/>
  <text x="24" y="54" font-family="Georgia" font-size="27" font-weight="700" fill="#fff">InvestInsight</text><text x="24" y="80" class="meta">新闻驱动的板块洞察</text>
  <text x="46" y="152" class="h3" fill="#CBD5E1">总览</text><rect x="18" y="176" width="200" height="44" rx="8" class="active"/><text x="46" y="204" class="h3" fill="#183B72">事件雷达</text>
  <text x="46" y="256" class="h3" fill="#CBD5E1">板块机会</text><text x="46" y="308" class="h3" fill="#CBD5E1">策略跟踪</text><text x="46" y="360" class="h3" fill="#CBD5E1">AI 助手</text><text x="46" y="412" class="h3" fill="#CBD5E1">配置</text>
  <rect x="236" y="0" width="1130" height="64" fill="#fff" stroke="#DDE3EC"/><text x="268" y="40" class="title">事件雷达</text><text x="378" y="40" class="body">事件状态、时间节点、传导路径和影响板块</text><text x="922" y="40" class="h3">20:25 · 50 结构事件 · 716 新闻样本</text>

  <rect x="260" y="88" width="1082" height="94" rx="8" class="surface"/>
  <text x="286" y="120" class="h2">事件状态总览</text>
  <g transform="translate(286,136)">
    <rect width="132" height="34" rx="6" class="soft"/><text x="14" y="22" class="body">预期事件</text><text x="96" y="23" class="h3 orange">18</text>
    <rect x="146" width="132" height="34" rx="6" class="soft"/><text x="160" y="22" class="body">已发生</text><text x="242" y="23" class="h3 green">12</text>
    <rect x="292" width="132" height="34" rx="6" class="soft"/><text x="306" y="22" class="body">待验证</text><text x="388" y="23" class="h3 blue">16</text>
    <rect x="438" width="132" height="34" rx="6" class="soft"/><text x="452" y="22" class="body">失效</text><text x="534" y="23" class="h3">4</text>
  </g>

  <rect x="260" y="206" width="650" height="626" rx="8" class="surface"/>
  <text x="286" y="238" class="h2">结构化事件时间线</text><text x="286" y="262" class="body">按状态和观察点组织，而不是按新闻时间堆叠。</text>
  <line x1="310" y1="300" x2="310" y2="786" stroke="#DDE3EC" stroke-width="2"/>
  <g>
    <circle cx="310" cy="324" r="7" fill="#C2410C"/><rect x="336" y="294" width="536" height="86" rx="7" class="soft"/>
