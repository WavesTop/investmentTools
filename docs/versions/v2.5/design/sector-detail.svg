  <text x="836" y="716" class="body">中期：均线空头排列，周级别动量偏弱，等待重新放量。</text>
  <text x="836" y="752" class="body">长期：月级别动量回落，产业趋势与估值分位需要再验证。</text>
  <text x="836" y="792" class="h3 orange">证据层在下方：核心评分、AI、技术指标、资金流、新闻证据。</text>
