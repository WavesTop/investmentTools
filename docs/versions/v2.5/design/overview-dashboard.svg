<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="860" viewBox="0 0 1366 860">
  <defs>
    <style>
      .bg{fill:#F5F7FA}
      .side{fill:#0E1626}
      .surface{fill:#fff;stroke:#DDE3EC;stroke-width:1}
      .soft{fill:#F8FAFD;stroke:#DDE3EC;stroke-width:1}
      .active{fill:#E8EEF9}
      .title{font:700 24px "Microsoft YaHei",Arial;fill:#111827}
      .h2{font:700 17px "Microsoft YaHei",Arial;fill:#111827}
      .h3{font:700 14px "Microsoft YaHei",Arial;fill:#111827}
      .body{font:400 12px "Microsoft YaHei",Arial;fill:#475569}
      .meta{font:400 11px "Microsoft YaHei",Arial;fill:#8A99AE}
      .num{font:700 26px "Microsoft YaHei",Arial;fill:#111827}
      .red{fill:#E5484D}
      .blue{fill:#2563EB}
      .green{fill:#16A34A}
      .orange{fill:#C2410C}
      .purple{fill:#6D5DF6}
      .line{stroke:#DDE3EC;stroke-width:1}
    </style>
  </defs>
  <rect class="bg" width="1366" height="860"/>
  <rect class="side" x="0" y="0" width="236" height="860"/>
  <text x="24" y="54" font-family="Georgia" font-size="27" font-weight="700" fill="#fff">InvestInsight</text>
  <text x="24" y="80" class="meta" fill="#9CA3AF">新闻驱动的板块洞察</text>
  <rect x="18" y="124" width="200" height="44" rx="8" class="active"/>
  <text x="46" y="152" class="h3" fill="#183B72">总览</text>
  <text x="46" y="204" class="h3" fill="#CBD5E1">事件雷达</text>
  <text x="46" y="256" class="h3" fill="#CBD5E1">板块机会</text>
  <text x="46" y="308" class="h3" fill="#CBD5E1">策略跟踪</text>
  <text x="46" y="360" class="h3" fill="#CBD5E1">AI 助手</text>
  <text x="46" y="412" class="h3" fill="#CBD5E1">配置</text>
  <rect x="18" y="758" width="200" height="78" rx="8" fill="#1B2A3D" stroke="#334155"/>
  <text x="36" y="786" class="h3" fill="#E5E7EB">数据状态</text>
  <circle cx="42" cy="810" r="5" fill="#16A34A"/><text x="56" y="814" class="meta" fill="#D1FAE5">行情等待刷新</text>
  <circle cx="42" cy="828" r="5" fill="#FACC15"/><text x="56" y="832" class="meta" fill="#FEF3C7">新闻等待扫描</text>

  <rect x="236" y="0" width="1130" height="64" fill="#fff" stroke="#DDE3EC"/>
  <text x="268" y="40" class="title">综合总览</text>
  <text x="394" y="40" class="body">市场温度、关键事件、机会风险和分析控制</text>
  <text x="922" y="40" class="h3">20:25 · 421 板块 · 规则引擎 · AI 可用</text>

  <rect x="260" y="88" width="1082" height="82" rx="8" class="surface"/>
  <text x="286" y="120" class="h2">今日工作台</text>
  <text x="286" y="146" class="body">先判断是否适合行动，再看事件和板块。未确认事件只进入观察，不直接触发买入。</text>
  <rect x="1048" y="110" width="150" height="34" rx="7" fill="#4258FF"/>
  <text x="1090" y="132" font-family="Microsoft YaHei" font-size="13" font-weight="700" fill="#fff">开始分析</text>
  <rect x="1212" y="110" width="104" height="34" rx="7" class="soft"/>
  <text x="1230" y="132" class="body">AI 深度分析</text>

  <rect x="260" y="192" width="1082" height="118" rx="8" class="surface"/>
  <text x="286" y="224" class="h2">市场仪表</text>
  <g transform="translate(286,242)">
    <rect width="172" height="52" rx="6" class="soft"/>
    <text x="16" y="18" class="meta">市场风险</text><text x="16" y="42" class="num blue">30</text><text x="68" y="42" class="meta">谨慎</text>
    <rect x="186" width="172" height="52" rx="6" class="soft"/>
    <text x="202" y="18" class="meta">板块数量</text><text x="202" y="42" class="num">421</text><text x="264" y="42" class="meta">本轮扫描</text>
    <rect x="372" width="172" height="52" rx="6" class="soft"/>
    <text x="388" y="18" class="meta">关键事件</text><text x="388" y="42" class="num orange">8</text><text x="432" y="42" class="meta">待验证</text>
    <rect x="558" width="172" height="52" rx="6" class="soft"/>
    <text x="574" y="18" class="meta">北向资金</text><text x="574" y="42" class="num red">368.7</text><text x="660" y="42" class="meta">亿元</text>
    <rect x="744" width="280" height="52" rx="6" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="760" y="20" class="meta">下一观察点</text><text x="760" y="42" class="h3 orange">FOMC / CPI / PCE / 非农就业</text>
  </g>

  <rect x="260" y="330" width="520" height="502" rx="8" class="surface"/>
  <text x="286" y="362" class="h2">关键事件雷达</text>
  <text x="286" y="386" class="body">只显示最影响板块的 5 条事件，标题可点击查看来源。</text>
  <g transform="translate(286,410)">
    <rect width="468" height="78" rx="7" class="soft"/>
    <text x="16" y="24" class="h3">企业盈利依然强劲，AI 交易终结还为时尚早</text>
    <text x="16" y="48" class="meta">Expected · EastmoneyFocus · 可信度 0.82 · 查看来源</text>
    <text x="16" y="68" class="body">盈利韧性 -> 成长估值承压缓解 -> 半导体/AI 链观察</text>
    <rect y="92" width="468" height="78" rx="7" class="soft"/>
    <text x="16" y="116" class="h3">国补延续，第三批 625 亿元资金已下达</text>
    <text x="16" y="140" class="meta">Expected · 财政政策 · 可信度 0.78 · 查看来源</text>
    <text x="16" y="160" class="body">政策落地 -> 消费/家电/汽车需求观察</text>
    <rect y="184" width="468" height="78" rx="7" class="soft"/>
    <text x="16" y="208" class="h3">沪指下跌 2.14%，航天装备、玻璃基板逆势走强</text>
    <text x="16" y="232" class="meta">Expected · 商品/库存 · 可信度 0.74 · 查看来源</text>
    <text x="16" y="252" class="body">市场风险升高 -> 防御/主题活跃 -> 资金确认</text>
  </g>

  <rect x="804" y="330" width="538" height="502" rx="8" class="surface"/>
  <text x="830" y="362" class="h2">板块机会与风险</text>
  <text x="830" y="386" class="body">只放 Top 8，长理由进入详情页，表格用于扫读。</text>
  <line x1="830" y1="410" x2="1312" y2="410" class="line"/>
  <text x="830" y="435" class="meta">板块</text><text x="980" y="435" class="meta">今日</text><text x="1046" y="435" class="meta">事件</text><text x="1116" y="435" class="meta">建议</text><text x="1198" y="435" class="meta">下一观察</text>
  <g class="body">
    <text x="830" y="470" class="h3">玻璃玻纤</text><text x="980" y="470" class="red">+2.14%</text><text x="1046" y="470" class="orange">0.49</text><text x="1116" y="470">回调观察</text><text x="1198" y="470">资金回流确认</text>
    <text x="830" y="512" class="h3">半导体设备</text><text x="980" y="512" class="blue">-0.88%</text><text x="1046" y="512" class="orange">0.48</text><text x="1116" y="512">过热不追</text><text x="1198" y="512">订单/政策验证</text>
    <text x="830" y="554" class="h3">存储芯片</text><text x="980" y="554" class="blue">-1.80%</text><text x="1046" y="554">0.37</text><text x="1116" y="554">谨慎</text><text x="1198" y="554">价格周期</text>
    <text x="830" y="596" class="h3">数字经济</text><text x="980" y="596" class="blue">-2.09%</text><text x="1046" y="596">0.31</text><text x="1116" y="596">观察</text><text x="1198" y="596">情绪修复</text>
  </g>
  <rect x="830" y="724" width="482" height="70" rx="7" fill="#F8FAFD" stroke="#DDE3EC"/>
  <text x="850" y="750" class="h3">AI 与规则摘要</text>
  <text x="850" y="774" class="body">当前使用规则引擎，AI 未启用或暂无有效输出。以上内容只用于投研辅助。</text>
</svg>
